<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <p class="label">Live Transit Monitor</p>
        <h1>Student Entered The Classroom</h1>
        <div class="divider"></div>
        <h2 id="count_person">0</h2>
        <div class="divider"></div>
        <div>
            <button id="incrment-btn" onclick="increment()">INCREMENT</button>
        </div>
        <div>
            <button id="save-btn" onclick="save()">SAVE</button>
        </div>
        <div class="divider"></div>
        <div>
            <p id="save_el" class="prev">Previous entires: </p>
        </div>
        <div class="status-row">
            <div class="dot"></div>
            <span class="status-text">Live Count</span>
        </div>
    </div>

    <script src="counter.js"></script>
</body>
</html>
